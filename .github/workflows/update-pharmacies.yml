name: Update Kenitra on-duty pharmacies

on:
  schedule:
    - cron: "15 6,12,18,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pharmacies
  cancel-in-progress: false

jobs:
  update-pharmacies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update pharmacy data
        run: node scripts/update-pharmacies.mjs

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/pharmacies-garde.json script.js; then
            echo "No pharmacy changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pharmacies-garde.json script.js
          git commit -m "Update pharmacy duty data"
          git pull --rebase origin main
          git push
          python3 - <<'PY'
          import json
          import urllib.request

          key = "9b3f6c4d9a284f8ba2e1630c5d7a9f21"
          payload = {
              "host": "medomicile.com",
              "key": key,
              "keyLocation": f"https://medomicile.com/{key}.txt",
              "urlList": [
                  "https://medomicile.com/pharmacies.html",
                  "https://medomicile.com/pharmacies-en.html",
                  "https://medomicile.com/pharmacies-ar.html",
                  "https://medomicile.com/sitemap.xml",
              ],
          }
          request = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              print("IndexNow status:", response.status)
          PY
